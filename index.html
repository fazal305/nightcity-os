<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>NIGHTCITY // OPERATING SYSTEM</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Share+Tech+Mono&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/windows.css">
    <link rel="stylesheet" href="css/apps.css">
</head>

<body>

    <section id="boot-screen">
        <div class="boot-panel">
            <p class="boot-logo">NIGHTCITY // OS</p>
            <div id="boot-output"></div>
            <span class="boot-cursor"></span>
        </div>
    </section>

    <section id="screensaver">
        <div class="screensaver-orb"></div>
        <p>NIGHTCITY IDLE MODE</p>
        <span>move mouse or press any key to wake</span>
    </section>

    <div id="desktop">

        <canvas id="wallpaper-canvas"></canvas>

        <main id="desktop-workspace">
            <section
                id="desktop-icons"
                aria-label="Desktop applications"
            ></section>

            <section
                id="window-layer"
                aria-label="Open windows"
            ></section>
        </main>

        <section
            id="notification-container"
            aria-label="System notifications"
        ></section>

        <footer id="taskbar">
            <button
                id="app-launcher-btn"
                class="taskbar-button"
                type="button"
                aria-label="Open app launcher"
            >
                ▦
            </button>

            <div id="taskbar-apps"></div>

            <div id="taskbar-clock">00:00:00</div>

            <div id="system-tray">
                <button
                    id="notification-test-btn"
                    class="taskbar-button"
                    type="button"
                    aria-label="Test notification"
                >
                    🔔
                </button>

                <span class="tray-status">ONLINE</span>
            </div>
        </footer>

    </div>

    <script src="js/storage/storage.js"></script>
    <script src="js/widgets/notifications.js"></script>

    <script src="js/core/window-manager.js"></script>
    <script src="js/core/taskbar.js"></script>
    <script src="js/core/desktop.js"></script>

    <script src="js/apps/radio.js"></script>
    <script src="js/apps/terminal.js"></script>
    <script src="js/apps/notes.js"></script>
    <script src="js/apps/weather.js"></script>
    <script src="js/apps/settings.js"></script>
    <script src="js/apps/explorer.js"></script>

    <script src="js/canvas/wallpaper.js"></script>
    <script src="js/audio/ambient.js"></script>

</body>

</html>
